{% extends 'main_app/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-success">
            <div class="card-header bg-success text-white">
                <h4>✅ Confirm Final Distribution</h4>
            </div>
            <div class="card-body">
                <p>You received: <strong>{{ claim.food.food_name }}</strong></p>
                <p class="text-muted">By confirming this, you certify that this food has been distributed to the needy.</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">How many people were served?</label>
                        <input type="number" name="people_served" class="form-control" placeholder="e.g., 20" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Estimated Weight Distributed (kg)</label>
                        <input type="number" step="0.1" name="weight_kg" class="form-control" placeholder="e.g., 5.0" required>
                        <small class="text-muted">This calculates the Carbon Emission savings.</small>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Confirm Impact</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
